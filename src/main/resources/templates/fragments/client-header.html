<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<header class="top-header"
        th:fragment="clientHeader">

    <div class="header-left">
        <h5 class="welcome-message">
            ¡Hola <span th:text="${userName}">María</span>!
        </h5>
    </div>

    <div class="header-right">
        <img th:src="@{/img/profiles/profile.png}"
             alt="Perfil"
             class="profile-image">
    </div>

</header>

</body>
</html>
