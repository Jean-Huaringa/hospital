<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Médicos | Panel Administrativo</title>

	<link rel="stylesheet" th:href="@{/css/admin-sidebar.css}">
	<link rel="stylesheet" th:href="@{/css/admin-navbar.css}">
	<link rel="stylesheet" th:href="@{/css/doctor-list.css}">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
	<link rel="stylesheet" th:href="@{/css/admin-modal.css}">
</head>

<body>

	<!-- SIDEBAR -->

	<div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div>

	<!-- CONTENIDO -->

	<div class="admin-content">

		<!-- NAVBAR -->

		<div th:replace="~{fragments/admin-navbar :: adminNavbar}"></div>

		<!-- MAIN -->

		<main class="doctor-container">

			<!-- HEADER -->

			<section class="page-header">

				<div>
					<h1 class="page-title">Médicos</h1>
					<p class="page-description">
						Gestiona los médicos registrados en el sistema.
					</p>
				</div>

				<a th:href="@{/admin/doctors/create}" class="new-doctor-button">
					<i class="bi bi-plus-circle"></i>
					<span>Nuevo Médico</span>
				</a>

			</section>

			<!-- FILTROS -->

			<section class="filters-section">
				<div class="filter-row">
					<div class="search-wrapper">
						<input type="text" placeholder="Buscar médico...">
					</div>
					<select class="specialty-select">

						<option>Todas las especialidades </option>
						<option> Cardiología </option>
						<option>Pediatría</option>
						<option>Neurología </option>
					</select>

					<select class="status-select">
						<option> Todos los estados</option>
						<option> Activo </option>
						<option> Inactivo </option>
					</select>
				</div>

			</section>

			<!-- CABECERA TABLA -->

			<section class="doctor-table-header">

				<div>Foto</div>
				<div>Médico</div>
				<div>Correo</div>
				<div>Especialidad</div>
				<div>Teléfono</div>
				<div>Estado</div>
				<div>Acciones</div>

			</section>

			<!-- LISTADO -->

			<section class="doctors-list">


				<article class="doctor-card">

					<div class="doctor-photo">
						<img th:src="@{/img/profiles/default-profile.jpg}">
					</div>

					<!-- NOMBRE -->
					<div class="doctor-name">

						<strong>
							Dr. Juan Pérez
						</strong>

					</div>

					<!-- CORREO -->
					<div class="doctor-email">

						juan.perez@hospital.com

					</div>

					<!-- ESPECIALIDAD -->
					<div class="doctor-specialty"> Cardiología </div>

					<!-- TELÉFONO -->
					<div class="doctor-phone"> 999 888 777 </div>

					<!-- ESTADO -->
					<div>
						<span class="status-badge active-status">ACTIVO </span>
					</div>

					<!-- ACCIONES -->
					<div class="doctor-actions">
						<a th:href="@{/admin/doctors/edit}" class="edit-button">
							<i class="bi bi-pencil-square"></i>
						</a>
						<button class="status-button" data-bs-toggle="modal" data-bs-target="#changeStatusModal">
							<i class="bi bi-arrow-repeat"></i>
						</button>
					</div>

				</article>

				<!-- FILA 2 -->

				<article class="doctor-card">

					<div class="doctor-photo">
						<img th:src="@{/img/profiles/default-profile.jpg}">
					</div>

					<!-- MÉDICO -->
					<div class="doctor-name">
						<strong>Dra. María López</strong>
					</div>

					<!-- CORREO -->
					<div class="doctor-email">
						maria.lopez@hospital.com
					</div>

					<!-- ESPECIALIDAD -->
					<div class="doctor-specialty">
						Pediatría
					</div>

					<!-- TELÉFONO -->
					<div class="doctor-phone">
						988 777 666
					</div>

					<!-- ESTADO -->
					<div>
						<span class="status-badge inactive-status">
							INACTIVO
						</span>
					</div>

					<!-- ACCIONES -->
					<div class="doctor-actions">
						<a th:href="@{/admin/doctors/edit}" class="edit-button">
							<i class="bi bi-pencil-square"></i>
						</a>
						<button class="status-button" data-bs-toggle="modal" data-bs-target="#changeStatusModal">
							<i class="bi bi-arrow-repeat"></i>
						</button>
					</div>

				</article>

			</section>

			<!-- PAGINACIÓN -->

			<section class="pagination-section">

				<ul class="pagination">

					<li class="page-item active"> <a class="page-link" href="#">1</a></li>
					<li class="page-item"> <a class="page-link" href="#">2</a></li>
					<li class="page-item"> <a class="page-link" href="#">3</a> </li>

				</ul>

			</section>

		</main>

	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<div th:replace="~{fragments/modals/change-status-modal :: changeStatusModal}">
	</div>
</body>

</html>
